<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Short Interval Data</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      padding: 24px;
    }

    select {
      padding: 8px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-height: 500px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #222;
      color: #fff;
      padding: 10px;
      border: 1px solid #444;
    }

    tbody td {
      padding: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #ddd;
    }

    tbody {
      display: block;
      max-height: 500px;
      overflow-y: auto;
    }

    thead, tbody tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }
  </style>
</head>
<body>
  <h1>Short Interval Data Viewer</h1>

  <form method="get">
    <label for="coin">Choose a coin:</label>
    <select name="coin" id="coin" onchange="this.form.submit()">
      {% for symbol in coin_list %}
        <option value="{{ symbol }}" {% if selected_coin == symbol %}selected{% endif %}>{{ symbol }}</option>
      {% endfor %}
    </select>
  </form>

  <table>
    <thead>
      <tr>
        <th>Timestamp (UTC)</th>
        <th>Price</th>
        <th>Volume (5min)</th>
        <th>Circulating Supply</th>
      </tr>
    </thead>
    <tbody>
      {% for entry in short_data %}
        <tr>
          <td>{{ entry.timestamp }}</td>
          <td>${{ entry.price }}</td>
          <td>{{ entry.volume_5min }}</td>
          <td>{{ entry.circulating_supply|default:"-" }}</td>
        </tr>
      {% empty %}
        <tr><td colspan="4">No data available.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
