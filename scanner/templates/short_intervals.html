<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Short Interval Viewer</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    select, button {
      padding: 6px;
      margin-right: 10px;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 8px;
      border: 1px solid #444;
    }
    th {
      background-color: #333;
    }
    tbody {
      max-height: 500px;
      overflow-y: auto;
      display: block;
    }
    tbody tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }
  </style>
</head>
<body>
  <h1>Short Interval Viewer</h1>

  <form method="get">
    <label for="coin">Coin:</label>
    <select name="coin" id="coin">
      {% for symbol in coins %}
        <option value="{{ symbol }}" {% if symbol == selected_coin %}selected{% endif %}>{{ symbol }}</option>
      {% endfor %}
    </select>

    <label for="date">Date:</label>
    <select name="date" id="date">
      {% for date in date_range %}
        <option value="{{ date }}" {% if date == selected_date %}selected{% endif %}>{{ date }}</option>
      {% endfor %}
    </select>

    <button type="submit">Load Data</button>
  </form>

  {% if data %}
    <table>
      <thead>
        <tr>
          <th>Timestamp (UTC)</th>
          <th>Price</th>
          <th>Volume (5m)</th>
          <th>Circulating Supply</th>
        </tr>
      </thead>
      <tbody>
        {% for row in data %}
          <tr>
            <td>{{ row.timestamp }}</td>
            <td>{{ row.price }}</td>
            <td>{{ row.volume_5min }}</td>
            <td>{{ row.circulating_supply }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% endif %}
</body>
</html>
