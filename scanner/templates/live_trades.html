
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="300">
  <title>Live Trades</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
    }
    .positive { color: #039975; }
    .negative { color: #F53341; }
    .container {
      width: 300px;
      font-family: sans-serif;
      font-size: 10px;
      margin: 10px;
      display: flex;
      flex-direction: column;
      text-align: center;
    }
    .table-header {
      font-size: 10px;
      width: 300px;
      border: 0.5px solid black;
      height: 25px;
      border-radius: 15px;
      margin: 10px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      padding: 0px 15px 4px 15px;
    }
    .table-row {
      font-size: 10px;
      width: 300px;
      border: 0.5px solid black;
      height: 25px;
      border-radius: 15px;
      margin: 10px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      padding: 0px 15px 4px 15px;
      background-color: black;
      color: white;
    }
    .title {
      width: 330px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
    }
    .entry {
      width: 50px;
      text-align: center;
    }
    .text {
      width: 100%;
    }
  </style>
</head>
<body>

  <script>
    setTimeout(() => {
      window.location.reload();
    }, 300000);
  </script>

  <div class-"container">
    <h2 class="title">Live Trades</h2>
    <div class="table-header">
      <div class="entry"><p>Coin</p></div>
      <div class="entry"><p>Trade</p></div>
      <div class="entry"><p>Entry</p></div>
      <div class="entry"><p>Current</p></div>
      <div class="entry"><p>PNL</p></div>
    </div>
    {% for trade in trades %}
      <div class="table-row">
        <div class="entry"><p>{{ trade.coin }}</p></div>
        <div class="entry"><p>{{ trade.type }}</p></div>
        <div class="entry"><p>{{ trade.entry_price }}</p></div>
        <div class="entry"><p>{{ trade.current_price }}</p></div>
        <div class="entry"><p class="{% if trade.pnl > 0 %}positive{% elif trade.pnl < 0 %}negative{% endif %}">{{ trade.pnl }}%</p></div>
      </div>
    {% endfor %}
  </div>
</body>
</html>
