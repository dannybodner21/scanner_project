
{% extends "layout.html" %}

{% block head %}

  <style>

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }
    body {
        font-family: sans-serif;
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top left, #b8ffcb 0%, rgba(255, 255, 255, 0) 70%),
                    radial-gradient(circle at top right, #408f55 0%, rgba(255, 255, 255, 0) 70%),
                    radial-gradient(circle at bottom left, #1e943d 0%, rgba(255, 255, 255, 0) 70%),
                    radial-gradient(circle at bottom right, #033811 0%, rgba(255, 255, 255, 0) 70%);
        background-size: 50% 50%;
        background-repeat: no-repeat;
        background-position: top left, top right, bottom left, bottom right;
        background-size: cover;
        background-attachment: fixed;
    }
    .volume_table {
      background: radial-gradient(circle at top left, #87ffa3 0%, rgba(255, 255, 255, 0) 70%),
                  radial-gradient(circle at top right, #61ed97 0%, rgba(255, 255, 255, 0) 70%),
                  radial-gradient(circle at bottom left, #31f558 0%, rgba(255, 255, 255, 0) 70%),
                  radial-gradient(circle at bottom right, #62de66 0%, rgba(255, 255, 255, 0) 70%);
      background-size: 50% 50%;
      background-repeat: no-repeat;
      background-position: top left, top right, bottom left, bottom right;
      background-size: cover;
      background-attachment: fixed;
      border-spacing: 10px;
      border-collapse: separate;
    }
    .container {
        display: flex;
        flex-direction: row;
        height: auto;
        width: 95%;
    }
    .left-column {
        width: 40%;
        padding: 10px;
    }
    .right-column {
        width: 60%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 100vh;
        position: sticky;
        top: 10px;
        padding-top: 5px;
    }
    .chart-container {
        height: 65%;
        padding: 5px;
    }
    table {
            border-spacing: 0px 10px; /* Remove gaps between cells */
            border-radius: 15px; /* Rounds the table corners */
            overflow: hidden; /* Clips any content that overflows the rounded corners */
            border-collapse: separate;
        }

    th, td {
            padding: 10px;
    }
    .table_card {
      color:black;
      background-color:rgba(255, 255, 255, 0.35);
      border-radius:15px;
      padding-left:15px;
    }
    .card_header {
      text-align:center;
      margin-bottom:15px;
    }
    .card_item {
      padding-left:30px;
      font-size:18px;
    }
    .table_header {
      /*position: sticky;
      top: 0px;*/
      z-index: 5;
      color:black;
      height:100px;
      font-size:30px;
      text-align:center;
      /*background-color: white;*/
      margin: 0px;
      padding: 0px;
      border-radius: 20px 20px 0px 0px;
    }


  </style>

{% endblock %}

{% block body %}

  <section class="container" style="margin-top: 60px;">

    <div class="left-column">

      <table class="volume_table" style="border-radius: 20px; width:100%; overflow-y: auto;">
        <thead>
          <th class="table_header">Relative Volume Scanner</th>
        </thead>
        <tbody id="volume-table-body" style="padding:10px;">


                <tr>
                  <td class="table_card">
                    <div class="card_header">
                      <h3>1. BTC $100,000</h3>
                    </div>
                    <p class="card_item"><strong>24h Price Change:</strong> 1.3%</p>
                    <p class="card_item"><strong>Daily RVOL:</strong> 2.3</p>
                    <p class="card_item"><strong>RVOL Progression:</strong> 2.3 | 2.4 | 2.1 | 3.4 | 5.6 | 7.6</p>
                  </td>
                </tr>
            


        </tbody>
      </table>
    </div>


    <div class="right-column">
      <div class="chart-container" id="chart1" style="border-radius:20px;">
        <div class="code-embed w-embed w-script" style="border-radius:20px;">
          <!--  TradingView Widget BEGIN  -->
          <div class="tradingview-widget-container" style="height:100%;width:100%; border-radius:20px;">
            <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%;border-radius:20px;"></div>
            <div class="tradingview-widget-copyright" style="border-radius:20px;">
              <a href="https://www.tradingview.com/" rel="noopener nofollow" target="_blank" style="border-radius:20px;"></a>
            </div>
            <script style="border-radius:20px;" type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async="">
              {
            "autosize": true,
            "symbol": "BINANCE:XRPUSDT",
            "interval": "5",
            "timezone": "America/Los_Angeles",
            "theme": "dark",
            "style": "8",
            "locale": "en",
            "backgroundColor": "rgba(0, 0, 0, 1)",
            "gridColor": "rgba(255, 255, 255, 0.06)",
            "withdateranges": true,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "watchlist": [
              "BINANCE:BTCUSDT"
            ],
            "details": true,
            "calendar": false,
            "show_popup_button": true,
            "popup_width": "1000",
            "popup_height": "850",
            "support_host": "https://www.tradingview.com"
          }
            </script>
          </div>
          <!--  TradingView Widget END  -->
        </div>
      </div>
    </div>

  </section>




{% endblock %}
